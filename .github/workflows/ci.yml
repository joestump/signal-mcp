name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --extra test

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format (ruff format --check)
        run: uv run ruff format --check .

      - name: Tests (pytest)
        run: uv run --extra test pytest tests/

      # Non-blocking for now: the codebase is not held to a strict mypy gate yet.
      # Flip this to blocking (remove continue-on-error) once the #10 refactor lands.
      - name: Type check (mypy)
        run: uv run mypy .
        continue-on-error: true
